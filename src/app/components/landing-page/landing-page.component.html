<div class="overlay"></div>
<div class="root-container">
  <div class="navbar">
    <div class="nav-items">
      <a [routerLink]="['/portfolio']" class="nav-item">Portfolio</a>
      <a [routerLink]="['/about']" class="nav-item">About & Skills</a>
      <a [routerLink]="['/profiles']" class="nav-item">Profiles</a>
    </div>
  </div>

  <div class="container">
    <rh-dp-logo class="dp-logo"></rh-dp-logo>
    <h4 class="short-bio">Software Engineer | Spring-Boot | Angular | NodeJS | ReactJS | React Native | AWS </h4>

    <q class="quote">I'm not a great programmer; I'm just a good programmer with great habits.</q>
    <div class="name">
      <p>
        Robiul Hassan
      </p>
      <div class="strip"></div>
    </div>

    <span (click)="onExploreMeClick()"
          (mouseover)="startTadaAnimation = false"
          [ngClass]="{'tada-animation':startTadaAnimation}">
      <button class="special-btn">
        <span>
          Explore Me
        </span>
      </button>
    </span>

    <div class="stick">
      <div class="stick-design"></div>
    </div>
  </div>

</div>
