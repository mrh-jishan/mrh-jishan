;border-top-right-radius:0;margin-top:0!important;}:not(pre)>code[class*='language-']{background:#011627;}.token.attr-name{color:rgb(173, 219, 103);font-style:italic;}.token.comment{color:rgb(128, 147, 147);}.token.string,.token.url{color:rgb(173, 219, 103);}.token.variable{color:rgb(214, 222, 235);}.token.number{color:rgb(247, 140, 108);}.token.builtin,.token.char,.token.constant,.token.function{color:rgb(130, 170, 255);}.token.punctuation{color:rgb(199, 146, 234);}.token.selector,.token.doctype{color:rgb(199, 146, 234);font-style:'italic';}.token.class-name{color:rgb(255, 203, 139);}.token.tag,.token.operator,.token.keyword{color:#ffa7c4;}.token.boolean{color:rgb(255, 88, 116);}.token.property{color:rgb(128, 203, 196);}.token.namespace{color:rgb(178, 204, 214);}code[class*='language-'],pre[class*='language-']{color:#F7FAFC;}:not(pre)>code[class*='language-'],pre[class*='language-']{background:#1A202C;border:1px solid #2D3748;}.mdx-marker{background-color:#2D3748;}.remark-code-title{background:#2D3748;color:#EDF2F7;border:1px solid #2D3748;}::selection{background-color:#90cdf4;color:#fefefe;}::-moz-selection{background:#ffb7b7;color:#fefefe;}html{min-width:356px;}body{background:#000;}#__next{display:-webkit-box;display:-webkit-flex;display:-ms-flexbox;display:flex;-webkit-flex-direction:column;-ms-flex-direction:column;flex-direction:column;min-height:100vh;}::-webkit-scrollbar{width:8px;background:#080808;}::-webkit-scrollbar-thumb{background:#111111;border-radius:8px;}</style><span></span></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"metadata":{"id":"I_kwDOESc60c6e56d6","url":"https://github.com/mrh-jishan/mrh-jishan/issues/1","updatedAt":"2024-11-17T15:20:43Z","createdAt":"2024-11-17T14:50:31Z","frontmatter":{"slug":"unleash-your-dev-blog-write-more-with-github-issues-as-your-cms","date":"02-Apr-2024","summary":"Turn your GitHub Issues into a powerful Next.js blog to write more and publish faster!","readingTime":"3 min read","image":"https://github.com/abdulrcs/abdulrahman.id/assets/54136956/37ce03da-b38f-4e32-84dd-c90636dcc2d6"},"body":"\r\nIn this article, I'm going to show you how to leverage Github Issues as a CMS, and integrate it into your Next.js blog 🚀\r\n\r\n![image](https://github.com/user-attachments/assets/ac3b94b9-ee7c-4f51-b6dd-904bb785d7ef)\r\n\r\nI recently migrated my [open-source portfolio website](https://github.com/abdulrcs/abdulrahman.id) from using Contentful API as a CMS (Content Management System) to GitHub Issues instead.\r\n\r\n\u003e Here's the detailed PR I made in my portfolio repo to migrate Contentful API to use GitHub Issues if you're interested:  [abdulrcs/abdulrahman.id#17](https://github.com/abdulrcs/abdulrahman.id/pull/17)\r\n\r\n## Why?\r\nI'm inspired by the blog from swyx.io that uses GitHub issues and comments, as mentioned [here](https://www.swyx.io/github-cms).\r\n\r\nThe friction of writing a GitHub issue is less daunting than using a fully-fledged CMS like Contentful because you have to log in to their page, navigate to the content section, host the images yourself, etc.\r\n \r\nThis will (hopefully) lead to more writings in the future 🤞\r\n \r\n## How to use the GitHub API\r\nWe can use a GitHub API wrapper using [renatorib/github-blog](https://github.com/renatorib/github-blog) to fetch our GitHub Issues.\r\n\r\nNote: GitHub API is limited to 5000 requests/hour, so we need to _statically render the blogs_ using `getStaticProps` and `getStaticPaths` to make it scalable, more on that later.\r\n\r\nFirst, [generate the GitHub token here](https://github.com/settings/tokens).\r\n \r\nAfter that, create new labels in your issue named `type:post`, `state:published`, and `state:draft`.\r\n\r\n![image](https://github.com/user-attachments/assets/89b3de5a-17ce-48fc-8214-39c4a0babcef)\r\n\r\nThen, we can create a GitHub issue for our blog post! Don't forget to add a _front matter_ in the issue to create a _slug_ for our post URL like this:\r\n\r\n```\r\n---\r\nslug: your-slug-title\r\n---\r\n```\r\n\r\n![image](https://github.com/user-attachments/assets/af2d02b7-5765-4edd-af69-ce9b97ccc514)\r\n\r\n## Integrating github-blog to Next.js\r\n### Installing the Library\r\nInstall `@rena.to/github-blog` in your Next.js project.\r\n\r\n```shell\r\nyarn add @rena.to/github-blog\r\n```\r\n\r\n### Fetching Lists of Posts\r\nHere's an example of how to fetch a list of posts statically using `getStaticProps`:\r\n \r\n```js\r\nexport async function getStaticProps() {\r\n  const blog = new GithubBlog({\r\n    repo: 'your-github-username/your-repo',\r\n    token: process.env.GITHUB_TOKEN,\r\n  })\r\n  const posts = await blog.getPosts({\r\n    query: {\r\n      author: 'your-github-username',\r\n      type: 'post',\r\n      state: 'published',\r\n    },\r\n    pager: { limit: 10, offset: 0 },\r\n  })\r\n\r\n  return {\r\n    props: {\r\n      posts: posts.edges,\r\n    },\r\n  }\r\n}\r\n```\r\n\r\n### Fetching a Post using Slug\r\nIn the `/blog/[slug]` page, you can query the exact post by using the slug:\r\n\r\n```js\r\nexport async function getStaticProps({ params }) {\r\n  const blog = new GithubBlog({\r\n    repo: 'your-github-username/your-repo',\r\n    token: process.env.GITHUB_TOKEN,\r\n  })\r\n  const data = await blog.getPost({\r\n    query: {\r\n      author: 'your-github-username',\r\n      search: params.slug,\r\n    },\r\n  })\r\n  const metadata = data.post\r\n  const source = metadata.body\r\n\r\n  return {\r\n    props: {\r\n      metadata,\r\n      source,\r\n    },\r\n    revalidate: 30,\r\n  }\r\n}\r\n```\r\n\r\n### Generating Static Paths for our posts\r\nWe need to statically generate our post URL links by fetching all the posts, and mapping each unique slug inside `getStaticPaths`:\r\n\r\n```js\r\nexport async function getStaticPaths() {\r\n  const blog = new GithubBlog({\r\n    repo: 'your-github-username/your-repo',\r\n    token: process.env.GITHUB_TOKEN,\r\n  })\r\n\r\n  const data = await blog.getPosts({\r\n    query: {\r\n      author: 'your-github-username',\r\n      type: 'post',\r\n      state: 'published',\r\n    },\r\n    pager: { limit: 10, offset: 0 },\r\n  })\r\n\r\n  return {\r\n    paths: data.edges.map(({ post }) =({\r\n      params: { slug: post.frontmatter.slug },\r\n    })),\r\n    fallback: false,\r\n  }\r\n}\r\n```\r\n\r\n## Adding Comments Feature\r\nWe can use [utteranc.es](https://utteranc.es/), a lightweight comment widget built on GitHub Issues to integrate _authed comments_ in our blog.\r\n\r\n![image](https://github.com/user-attachments/assets/64b29d9e-76b2-4748-bc9a-8ce92c194dda)\r\n\r\nThis is brilliant because in a _Developer Blog_ of course there's a big chance that our audience has a GitHub profile 😆\r\n\r\nSince we already integrated the GitHub Issues as our blog, we can add comments to our blog by adding this script to our page:\r\n\r\n```\r\n\u003cscript src=\"https://utteranc.es/client.js\"\r\n        repo=\"[ENTER REPO HERE]\"\r\n        issue-term=\"title\"\r\n        theme=\"github-dark\"\r\n        crossorigin=\"anonymous\"\r\n        async\u003e\r\n\u003c/script\u003e\r\n```\r\n\r\n## That's it!\r\n![image](https://github.com/user-attachments/assets/82968d5f-55a0-43f1-9d5e-11890d5b37da)\r\n\r\n\r\nI hope that integrating GitHub issues as the source of your posts will empower you to write more consistently and publish faster 🥳\r\n\r\n","title":"unleash-your-dev-blog-write-more-with-github-issues-as-your-cms","author":{"avatarUrl":"https://avatars.githubusercontent.com/u/16862701?u=054bb46f7a4f3399e61a733317dd77e4a8acb1ce\u0026v=4","login":"mrh-jishan","name":"Robiul Hassan","twitterUsername":null},"labels":{"type":["post"],"state":["published"]},"totalComments":1,"reactions":{"THUMBS_UP":0,"THUMBS_DOWN":0,"LAUGH":0,"HOORAY":0,"CONFUSED":0,"HEART":0,"ROCKET":0,"EYES":0},"totalReactions":0,"readingTime":"3 min read"},"publishedDate":"2024-04-02T00:00:00.000Z","source":{"compiledSource":"var u=Object.defineProperty,l=
